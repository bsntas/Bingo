<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #07101e;
      --surface:     #0f1d2e;
      --surface2:    #172639;
      --surface3:    #1e3350;
      --accent:      #4ade80;
      --accent-dim:  #14532d;
      --accent-glow: rgba(74,222,128,0.22);
      --blue:        #60a5fa;
      --blue-glow:   rgba(96,165,250,0.22);
      --red:         #f87171;
      --red-glow:    rgba(248,113,113,0.22);
      --text:        #e2e8f0;
      --text-muted:  #94a3b8;
      --text-dim:    #4b6380;
      --border:      #1a2e44;
      --border2:     #243b55;
      --marked:      #14532d;
      --marked-text: #4ade80;
      --gold:        #fbbf24;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 50% at 15% 15%, rgba(74,222,128,0.05) 0%, transparent 100%),
        radial-gradient(ellipse 60% 50% at 85% 85%, rgba(96,165,250,0.05) 0%, transparent 100%);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ── Screens ── */
    .screen {
      display: none;
      width: 100%;
      max-width: 480px;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .screen.active { display: flex; animation: screenIn 0.3s cubic-bezier(0.22,1,0.36,1); }
    #game-screen { align-items: stretch; }
    #bingo-score { justify-content: center; }
    #exit-btn { align-self: center; }

    @keyframes screenIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Title ── */
    .title {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: 0.3em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(74,222,128,0.35));
      user-select: none;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 1.25rem;
      padding: 2rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 12px 40px rgba(0,0,0,0.5),
        0 2px 8px rgba(0,0,0,0.3);
    }

    /* ── Labels ── */
    .section-label {
      font-size: 0.72rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    /* ── Inputs ── */
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 0.625rem;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input[type="text"]::placeholder { color: var(--text-dim); }
    input[type="text"].uppercase { text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; }
    input[type="number"] {
      text-align: center;
      font-size: 1.75rem;
      font-weight: 800;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* ── Role group ── */
    .role-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .role-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 0.625rem;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .role-label input { display: none; }
    .role-label.selected {
      border-color: var(--accent);
      background: rgba(74,222,128,0.07);
      color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── Buttons ── */
    button {
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 0.625rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    button:active { transform: scale(0.96) !important; }
    button:disabled { opacity: 0.38; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .btn-primary {
      background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
      color: #052e16;
      width: 100%;
      box-shadow: 0 4px 18px var(--accent-glow), 0 1px 3px rgba(0,0,0,0.3);
      letter-spacing: 0.01em;
    }
    .btn-primary:not(:disabled):hover {
      box-shadow: 0 6px 24px rgba(74,222,128,0.4), 0 2px 6px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }

    /* ── Text helpers ── */
    .error   { color: var(--red);      font-size: 0.875rem; min-height: 1.25rem; text-align: center; }
    .dim-text{ color: var(--text-muted); font-size: 0.85rem;  text-align: center; }

    /* ── Room code ── */
    .room-code-box {
      background: var(--bg);
      border: 1.5px solid var(--border2);
      border-radius: 1rem;
      padding: 1.1rem 1.5rem;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .room-code-box .label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }
    .room-code-box .code-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 0.4rem;
    }
    .room-code-box .code {
      font-size: 2.75rem;
      font-weight: 900;
      letter-spacing: 0.4em;
      color: var(--blue);
      text-shadow: 0 0 28px var(--blue-glow);
      font-variant-numeric: tabular-nums;
    }
    .btn-copy {
      padding: 0.45rem 0.95rem;
      font-size: 0.78rem;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border2);
      border-radius: 0.4rem;
      width: auto;
      font-weight: 500;
    }
    .btn-copy:hover { background: var(--surface3); color: var(--text); }

    /* ── Player list ── */
    .player-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .player-list li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.625rem 0.875rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      font-size: 0.93rem;
      font-weight: 500;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .player-list li .badge {
      font-size: 0.63rem;
      padding: 0.15rem 0.45rem;
      border-radius: 0.25rem;
      background: rgba(74,222,128,0.12);
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-left: auto;
    }
    .player-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }
    .av-0 { background: #6366f1; }
    .av-1 { background: #ec4899; }
    .av-2 { background: #f59e0b; }
    .av-3 { background: #10b981; }
    .av-4 { background: #3b82f6; }

    .turn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .player-list li.active-turn {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    .player-list li.active-turn .turn-dot {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* ── BINGO score ── */
    #bingo-score { display: flex; gap: 0.25rem; justify-content: center; }
    .bingo-letter {
      font-size: 2.8rem;
      font-weight: 900;
      width: 3rem;
      text-align: center;
      color: rgba(248,113,113,0.18);
      transition: color 0.35s, text-shadow 0.35s;
    }
    .bingo-letter.scored {
      color: var(--accent);
      text-shadow: 0 0 18px var(--accent-glow);
      animation: letterPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes letterPop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.45) rotate(-4deg); }
      70%  { transform: scale(0.92) rotate(2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* ── Bingo board ── */
    #bingo-board {
      display: grid;
      gap: 5px;
      width: 100%;
      pointer-events: none;
    }
    .cell {
      aspect-ratio: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      user-select: none;
      cursor: default;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.18s, border-color 0.18s, transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    #bingo-board.active { pointer-events: auto; }
    #bingo-board.active .cell:not(.marked) { cursor: pointer; }
    #bingo-board.active .cell:not(.marked):hover {
      background: var(--surface2);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.3);
      transform: scale(1.06);
      z-index: 1;
    }
    .cell.marked {
      background: var(--marked);
      border-color: var(--accent-dim);
      color: var(--marked-text);
      cursor: default;
      animation: cellMark 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cell.strike-h, .cell.strike-v,
    .preview-cell.strike-h, .preview-cell.strike-v {
      background: #1c6b3c;
      border-color: var(--accent);
    }
    .cell.strike-h::before, .preview-cell.strike-h::before {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 50%;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent-glow);
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 2;
    }
    .cell.strike-v::after, .preview-cell.strike-v::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: 50%;
      width: 2px;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent-glow);
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 2;
    }
    @keyframes cellMark {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.8); }
      100% { transform: scale(1); }
    }

    /* ── Game layout ── */
    #game-players-section { width: 100%; }

    /* ── Instruction bar ── */
    #instruction {
      padding: 0.7rem 1rem;
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: 0.625rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      text-align: center;
      height: 3rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
    }
    #instruction.my-turn {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      animation: turnPulse 2.4s ease-in-out infinite;
    }
    @keyframes turnPulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(74,222,128,0.22); }
      50%       { box-shadow: 0 0 0 6px rgba(74,222,128,0.08); }
    }

    /* ── Game over ── */
    #gameover-screen { gap: 1.5rem; }
    .go-title {
      font-size: 3rem;
      font-weight: 900;
      text-align: center;
    }
    .go-title.go-win {
      color: var(--accent);
      text-shadow: 0 0 28px var(--accent-glow);
      animation: winGlow 1.8s ease-in-out infinite alternate;
    }
    .go-title.go-lose {
      color: var(--red);
      text-shadow: 0 0 24px var(--red-glow);
    }
    @keyframes winGlow {
      from { text-shadow: 0 0 16px rgba(74,222,128,0.4); }
      to   { text-shadow: 0 0 40px rgba(74,222,128,0.7); }
    }

    #winner-text {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      color: var(--blue);
    }
    #winner-text.is-winner { color: var(--accent); }

    #gameover-board-wrap { width: 100%; }
    #gameover-board-wrap .section-label { text-align: center; margin-bottom: 0.5rem; }
    #gameover-board { display: grid; gap: 3px; width: 100%; margin: 0 auto; }
    .preview-cell {
      aspect-ratio: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.35rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      position: relative;
      overflow: hidden;
      font-weight: 600;
      color: var(--text-dim);
    }
    .preview-cell.marked {
      background: var(--marked);
      border-color: var(--accent-dim);
      color: var(--marked-text);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(3rem);
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      font-size: 0.875rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 999;
      max-width: 90vw;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Exit btn ── */
    #exit-btn {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border2);
      font-size: 0.8rem;
      padding: 0.5rem 1.25rem;
      width: auto;
    }
    #exit-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .title { font-size: 2.75rem; }
      .bingo-letter { font-size: 2rem; width: 2.3rem; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- ── Start ─────────────────────────────────────────────────────── -->
<div id="start-screen" class="screen active">
  <div class="title">BINGO</div>
  <div class="card">
    <div>
      <div class="section-label">Your Name</div>
      <input type="text" id="name-input" placeholder="Enter your name" maxlength="20" autocomplete="off">
    </div>
    <div>
      <div class="section-label">Role</div>
      <div class="role-group">
        <label class="role-label selected" id="lbl-host">
          <input type="radio" name="role" value="host" id="radio-host" checked>
          🎯 Host a game
        </label>
        <label class="role-label" id="lbl-join">
          <input type="radio" name="role" value="join" id="radio-join">
          🔗 Join a game
        </label>
      </div>
    </div>
    <div id="grid-size-wrap">
      <div class="section-label">Grid Size (5&ndash;15)</div>
      <input type="number" id="grid-size-input" min="5" max="15" value="5" inputmode="numeric">
      <p class="dim-text" id="grid-size-hint" style="margin-top:0.35rem">5 &times; 5 grid &middot; 25 numbers</p>
    </div>
    <div id="room-input-wrap" style="display:none">
      <div class="section-label">Room Code</div>
      <input type="text" id="room-input" placeholder="4-letter code" maxlength="4" autocomplete="off" class="uppercase">
    </div>
    <button class="btn-primary" id="continue-btn">Continue</button>
    <p class="error" id="start-error"></p>
  </div>
</div>

<!-- ── Lobby ──────────────────────────────────────────────────────── -->
<div id="lobby-screen" class="screen">
  <div class="title">BINGO</div>
  <div class="card">
    <div class="room-code-box" id="room-code-box" style="display:none">
      <div class="label">Room Code &mdash; share with friends</div>
      <div class="code-row">
        <div class="code" id="room-code-text"></div>
        <button class="btn-copy" id="btn-copy">Copy</button>
      </div>
    </div>
    <div>
      <div class="section-label">Players (<span id="player-count">0</span>/5)</div>
      <ul class="player-list" id="lobby-player-list"></ul>
    </div>
    <button class="btn-primary" id="start-btn" style="display:none" disabled>Waiting for players&hellip;</button>
    <p class="dim-text" id="lobby-status"></p>
  </div>
</div>

<!-- ── Game ───────────────────────────────────────────────────────── -->
<div id="game-screen" class="screen">
  <div id="bingo-score">
    <span class="bingo-letter" id="bl-0">B</span>
    <span class="bingo-letter" id="bl-1">I</span>
    <span class="bingo-letter" id="bl-2">N</span>
    <span class="bingo-letter" id="bl-3">G</span>
    <span class="bingo-letter" id="bl-4">O</span>
  </div>
  <div id="game-players-section">
    <div class="section-label" style="text-align:center;margin-bottom:0.5rem">Players</div>
    <ul class="player-list" id="game-player-list"></ul>
  </div>
  <div id="bingo-board"></div>
  <div id="instruction">Waiting&hellip;</div>
  <button id="exit-btn">Leave game</button>
</div>

<!-- ── Game Over ──────────────────────────────────────────────────── -->
<div id="gameover-screen" class="screen">
  <div class="go-title go-lose" id="go-title">Game Over</div>
  <div id="winner-text"></div>
  <div id="gameover-board-wrap">
    <div class="section-label">Your final board</div>
    <div id="gameover-board"></div>
  </div>
  <button class="btn-primary" id="play-again-btn" style="max-width:240px">Play Again</button>
</div>

<div id="toast"></div>

<script type="module" src="game.js"></script>
</body>
</html>
